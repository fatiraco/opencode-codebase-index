name: Create Windows Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag della release, ad esempio v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Pubblica come prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build and release Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build native module for Windows x64
        working-directory: native
        run: npx napi build --release --platform --target x86_64-pc-windows-msvc

      - name: Build JavaScript bundle
        run: npm run build:ts

      - name: Prepare portable plugin
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $releaseRoot = "release"
          $pluginDir = Join-Path $releaseRoot "plugins"
          $nativeDir = Join-Path $releaseRoot "native"
          $bundleSource = "dist/index.js"
          $bundleTarget = Join-Path $pluginDir "opencode-codebase-index.js"
          $nativeName = "codebase-index-native.win32-x64-msvc.node"

          Remove-Item $releaseRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $pluginDir -Force | Out-Null
          New-Item -ItemType Directory -Path $nativeDir -Force | Out-Null

          if (-not (Test-Path $bundleSource)) {
            throw "Bundle JavaScript non trovato: $bundleSource"
          }

          $nativeSource = Get-ChildItem -Path "native" -Recurse -File -Filter $nativeName |
            Select-Object -First 1

          if (-not $nativeSource) {
            throw "Modulo nativo non trovato: $nativeName"
          }

          Copy-Item $bundleSource $bundleTarget
          Copy-Item $nativeSource.FullName (Join-Path $nativeDir $nativeName)

          @"
          opencode-codebase-index - Windows x64

          Installazione:
          1. Estrarre il contenuto dello ZIP nella cartella di configurazione globale di OpenCode.
          2. Verificare la presenza di:
             plugins/opencode-codebase-index.js
             native/codebase-index-native.win32-x64-msvc.node
          3. Rimuovere da opencode.json il riferimento npm o file:/// al plugin originale.
          4. Riavviare OpenCode.
          "@ | Set-Content -Path (Join-Path $releaseRoot "INSTALL.txt") -Encoding UTF8

      - name: Create ZIP
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"
          $zipName = "opencode-codebase-index-$env:RELEASE_TAG-windows-x64.zip"

          Remove-Item $zipName -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path "release/*" -DestinationPath $zipName -CompressionLevel Optimal

          if (-not (Test-Path $zipName)) {
            throw "Creazione ZIP fallita: $zipName"
          }

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $ErrorActionPreference = "Stop"
          $zipName = "opencode-codebase-index-$env:RELEASE_TAG-windows-x64.zip"
          $arguments = @(
            "release",
            "create",
            $env:RELEASE_TAG,
            $zipName,
            "--target",
            "${{ github.sha }}",
            "--title",
            "opencode-codebase-index $env:RELEASE_TAG - Windows x64",
            "--generate-notes"
          )

          if ($env:IS_PRERELEASE -eq "true") {
            $arguments += "--prerelease"
          }

          & gh @arguments
          if ($LASTEXITCODE -ne 0) {
            throw "Creazione della release GitHub fallita"
          }
