name: Create Windows Release

on:
  workflow_dispatch:
    inputs:
      version_increment:
        description: "Parte della versione da incrementare"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Build and release Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Configure Git
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Increment version
        id: version
        shell: pwsh
        env:
          VERSION_INCREMENT: ${{ inputs.version_increment }}
        run: |
          $ErrorActionPreference = "Stop"

          npm version $env:VERSION_INCREMENT --no-git-tag-version

          if ($LASTEXITCODE -ne 0) {
            throw "Incremento della versione non riuscito"
          }

          $version = node -p "require('./package.json').version"
          $tag = "v$version"

          git fetch --tags --force
          $existingTag = git tag --list $tag
          if ($existingTag) {
            throw "Il tag $tag esiste gia'"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Build native module for Windows x64
        working-directory: native
        run: npx napi build --release --platform --target x86_64-pc-windows-msvc

      - name: Build JavaScript bundle
        run: npm run build:ts

      - name: Prepare portable plugin
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $releaseRoot = "release"
          $pluginDir = Join-Path $releaseRoot "plugins"
          $nativeDir = Join-Path $releaseRoot "native"
          $bundleSource = "dist/index.js"
          $bundleTarget = Join-Path $pluginDir "opencode-codebase-index.js"
          $nativeName = "codebase-index-native.win32-x64-msvc.node"

          Remove-Item $releaseRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $pluginDir -Force | Out-Null
          New-Item -ItemType Directory -Path $nativeDir -Force | Out-Null

          if (-not (Test-Path $bundleSource)) {
            throw "Bundle JavaScript non trovato: $bundleSource"
          }

          $nativeSource = Get-ChildItem -Path "native" -Recurse -File -Filter $nativeName |
            Select-Object -First 1

          if (-not $nativeSource) {
            throw "Modulo nativo non trovato: $nativeName"
          }

          Copy-Item $bundleSource $bundleTarget
          Copy-Item $nativeSource.FullName (Join-Path $nativeDir $nativeName)

          @"
          opencode-codebase-index - Windows x64
          Versione: ${{ steps.version.outputs.version }}

          Installazione:
          1. Estrarre il contenuto dello ZIP nella cartella di configurazione globale di OpenCode.
          2. Verificare la presenza di:
             plugins/opencode-codebase-index.js
             native/codebase-index-native.win32-x64-msvc.node
          3. Rimuovere da opencode.json il riferimento npm o file:/// al plugin originale.
          4. Riavviare OpenCode.
          "@ | Set-Content -Path (Join-Path $releaseRoot "INSTALL.txt") -Encoding UTF8

      - name: Create ZIP
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"
          $zipName = "opencode-codebase-index-$env:RELEASE_TAG-windows-x64.zip"

          Remove-Item $zipName -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path "release/*" -DestinationPath $zipName -CompressionLevel Optimal

          if (-not (Test-Path $zipName)) {
            throw "Creazione ZIP fallita: $zipName"
          }

      - name: Commit version
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"

          git add package.json package-lock.json
          git commit -m "chore: release $env:RELEASE_TAG"

          if ($LASTEXITCODE -ne 0) {
            throw "Commit della versione non riuscito"
          }

          git push origin "HEAD:${{ github.ref_name }}"

          if ($LASTEXITCODE -ne 0) {
            throw "Push della nuova versione non riuscito"
          }

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"
          $zipName = "opencode-codebase-index-$env:RELEASE_TAG-windows-x64.zip"
          $arguments = @(
            "release",
            "create",
            $env:RELEASE_TAG,
            $zipName,
            "--target",
            "${{ github.ref_name }}",
            "--title",
            "opencode-codebase-index $env:RELEASE_TAG - Windows x64",
            "--generate-notes"
          )

          & gh @arguments

          if ($LASTEXITCODE -ne 0) {
            throw "Creazione della release GitHub fallita"
          }
